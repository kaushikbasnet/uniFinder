<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RACE | Study Abroad Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#116e94;
  --primary-dark:#0d5572;
  --primary-light:#1a8ab8;
  --accent:#ebebeb;
  --off-white:#fafafa;
  --soft-gray:#edf4f7;
  --glass:rgba(255,255,255,0.92);
  --text:#0a2433;
  --muted:#5a7a8a;
  --card-bg:#ffffff;
  --card-border:#e8edf0;
  --divider:#f0f4f6;
  --score-bg:#f5f7f8;
  --score-text:#3a5a6a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Montserrat',sans-serif;
  background:var(--off-white);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}

/* ── HERO ── */
.hero{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding:70px 8% 60px;
  overflow:hidden;
  min-height:520px;
  justify-content:center;
}
.hero-map-bg{
  position:absolute;inset:0;z-index:0;overflow:hidden;background:#fafafa;
}
.hero-map-bg::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 50%,rgba(250,250,250,0.45) 0%,transparent 70%),
    linear-gradient(to bottom,rgba(250,250,250,0.1) 0%,rgba(250,250,250,0.92) 85%,rgba(250,250,250,1) 100%);
  z-index:2;pointer-events:none;
}
.hero-content{position:relative;z-index:2;max-width:780px;margin-bottom:44px;}
h1{
  font-size:clamp(1.6rem,3vw,2.6rem);
  line-height:1.1;font-weight:700;margin-bottom:18px;
  letter-spacing:-0.5px;white-space:nowrap;
}
@media(max-width:700px){h1{white-space:normal;font-size:2rem;}}
h1 em{font-style:italic;color:var(--primary);font-weight:800;}
.hero-p{font-size:0.95rem;color:var(--muted);line-height:1.8;max-width:520px;margin:0 auto 32px;font-weight:400;}
.hero-p strong{color:var(--primary);font-weight:700;}
.intake-row{display:flex;gap:32px;justify-content:center;flex-wrap:wrap;}
.intake-item{border-left:3px solid var(--primary);padding-left:15px;text-align:left;}
.intake-item:last-child{border-left-color:var(--primary-light);opacity:0.8;}
.intake-item .val{font-weight:800;font-size:1.2rem;color:var(--primary);}
.intake-item .lbl{font-size:0.62rem;opacity:0.6;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-top:2px;}

/* search card */
.search-container{position:relative;z-index:2;width:100%;max-width:540px;}
.search-card{
  background:var(--glass);backdrop-filter:blur(20px);
  padding:42px 44px;border-radius:24px;
  border:1px solid rgba(17,110,148,0.15);
  box-shadow:0 20px 80px rgba(17,110,148,0.12),0 4px 20px rgba(17,110,148,0.06);
}
.search-card-title{
  font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:2px;
  color:var(--primary);margin-bottom:24px;padding-bottom:14px;
  border-bottom:1px solid rgba(17,110,148,0.12);
}
.input-group{margin-bottom:20px;}
.input-group label{
  display:block;font-size:0.58rem;font-weight:800;text-transform:uppercase;
  letter-spacing:1.5px;margin-bottom:6px;color:var(--muted);
}
.input-group select{
  width:100%;background:var(--accent);border:1.5px solid transparent;
  border-radius:10px;padding:11px 14px;font-size:0.88rem;
  font-family:'Montserrat',sans-serif;color:var(--text);cursor:pointer;
  outline:none;transition:border-color 0.25s,background 0.25s;font-weight:500;
}
.input-group select:focus{border-color:var(--primary);background:#fff;}
.cta-btn{
  width:100%;padding:16px;background:var(--primary);color:#fff;border:none;
  border-radius:12px;font-weight:800;font-size:0.78rem;text-transform:uppercase;
  letter-spacing:2px;cursor:pointer;transition:all 0.28s;margin-top:8px;
  font-family:'Montserrat',sans-serif;
}
.cta-btn:hover{background:var(--primary-dark);transform:translateY(-2px);box-shadow:0 8px 24px rgba(17,110,148,0.3);}

/* ── RESULTS ── */
#results-section{padding:60px 5%;display:none;background:#fafafa;border-top:1px solid #e8e8e8;}
.results-header{margin-bottom:32px;}
.results-header h3{font-size:1.9rem;font-weight:800;letter-spacing:-0.5px;color:var(--text);}
.result-summary{font-size:0.78rem;color:var(--muted);margin-top:8px;font-weight:600;letter-spacing:0.3px;}

/* 4-column flat grid */
.prog-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
}
@media(max-width:1100px){.prog-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.prog-grid{grid-template-columns:1fr;}}

/* Pagination */
.pagination-controls{
  margin-top:48px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
}
.page-btn{
  padding:11px 26px;
  border:1.5px solid var(--primary);
  background:transparent;
  color:var(--primary);
  border-radius:10px;
  font-weight:800;
  font-size:0.75rem;
  letter-spacing:1px;
  text-transform:uppercase;
  cursor:pointer;
  font-family:'Montserrat',sans-serif;
  transition:all 0.2s;
}
.page-btn:hover:not(:disabled){background:var(--primary);color:#fff;}
.page-btn:disabled{opacity:0.3;cursor:not-allowed;}
.page-info{font-size:0.82rem;font-weight:700;color:var(--muted);min-width:100px;text-align:center;}




/* ── NEW CARD STYLE matching screenshot ── */
.prog-card{
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:16px;
  padding:0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  transition:box-shadow 0.25s,transform 0.25s;
  font-family:'Montserrat',sans-serif;
}
.prog-card:hover{
  box-shadow:0 8px 32px rgba(17,110,148,0.13);
  transform:translateY(-3px);
}

/* Card top section: university + program + country */
.card-header{
  padding:18px 18px 14px;
  border-bottom:1px solid var(--divider);
}
.card-uni-name{
  font-size:0.7rem;
  font-weight:700;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.8px;
  margin-bottom:6px;
  line-height:1.4;
}
.card-program-name{
  font-size:1.05rem;
  font-weight:800;
  color:var(--text);
  line-height:1.35;
  margin-bottom:8px;
  letter-spacing:-0.3px;
}
.card-country{
  display:inline-block;
  font-size:0.65rem;
  font-weight:700;
  color:var(--primary);
  letter-spacing:0.5px;
  text-transform:uppercase;
}

/* Card meta row: intake / duration / GPA */
.card-meta{
  padding:12px 18px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:0;
  border-bottom:1px solid var(--divider);
  background:#fafcfd;
}
.card-meta-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:6px 4px;
}
.card-meta-item:not(:last-child){
  border-right:1px solid var(--divider);
}
.card-meta-label{
  font-size:0.55rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:1px;
  color:var(--muted);
  margin-bottom:4px;
}
.card-meta-value{
  font-size:0.78rem;
  font-weight:700;
  color:var(--text);
  text-align:center;
  line-height:1.3;
}
.card-meta-icon{
  font-size:0.75rem;
  margin-right:3px;
}

/* Tuition + application fee row */
.card-fees{
  padding:12px 18px;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  border-bottom:1px solid var(--divider);
}
.card-fee-block{
  display:flex;
  flex-direction:column;
}
.card-fee-label{
  font-size:0.58rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.8px;
  color:var(--muted);
  margin-bottom:3px;
}
.card-fee-value{
  font-size:1.1rem;
  font-weight:800;
  color:var(--text);
  letter-spacing:-0.3px;
}
.card-fee-block.right{
  text-align:right;
}
.card-fee-icon{
  font-size:0.9rem;
  margin-right:4px;
}

/* Test scores section */
.card-scores{
  padding:12px 18px 18px;
  margin-top:auto;
}
.card-scores-heading{
  font-size:0.6rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:1px;
  color:var(--muted);
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:5px;
}
.scores-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
}
.score-chip{
  background:var(--score-bg);
  border-radius:8px;
  padding:7px 4px 6px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
}
.score-val{
  font-size:0.82rem;
  font-weight:800;
  color:var(--text);
  line-height:1;
}
.score-label{
  font-size:0.52rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.5px;
  color:var(--muted);
}



@media(max-width:640px){
  .prog-grid{grid-template-columns:1fr;}
  .search-card{padding:28px 22px;}
  .uni-section-header{padding:18px 20px;}
  .uni-section-body{padding:16px 18px 22px;}
  .card-meta{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>

</section>

const ALL_FIELDS = [
  "Architecture & Built Environment","Arts & Humanities","Business & Management",
  "Creative Arts, Design & Media","Engineering & Technology","Health Sciences",
  "Hospitality, Tourism & Culinary Arts","IT & Computer Science",
  "Law, Politics & Social Sciences","Sciences"
];

const CARDS_PER_PAGE = 16;
let filteredData = [];
let currentPage  = 1;

function parseScores(english) {
  const result = { ielts:'---', toefl:'---', pte:'---', det:'---' };
  if (!english || english === 'Contact RACE') return result;
  const ieltsM = english.match(/IELTS\s*([\d.–-]+)/i);
  const toeflM = english.match(/TOEFL\s*(\d+)/i);
  const pteM   = english.match(/PTE\s*(\d+)/i);
  const detM   = english.match(/DET\s*(\d+)/i);
  if (ieltsM) result.ielts = ieltsM[1];
  if (toeflM) result.toefl = toeflM[1];
  if (pteM)   result.pte   = pteM[1];
  if (detM)   result.det   = detM[1];
  return result;
}

function syncFilters() {
  const country = document.getElementById('country').value;
  const level   = document.getElementById('level').value;
  const fieldEl = document.getElementById('field');
  const prev    = fieldEl.value;
  const available = new Set();
  DB.forEach(r => {
    if ((!country || r.country === country) && (!level || r.level === level)) available.add(r.field);
  });
  fieldEl.innerHTML = '<option value="">Field of Study</option>';
  ALL_FIELDS.forEach(f => {
    if (available.has(f)) {
      const o = document.createElement('option');
      o.value = f; o.textContent = f;
      if (f === prev) o.selected = true;
      fieldEl.appendChild(o);
    }
  });
}

function buildCard(r) {
  const firstIntake = r.intake ? r.intake.split('/')[0].trim() : 'TBC';
  const s = parseScores(r.english);
  return `
    <div class="prog-card">
      <div class="card-header">
        <div class="card-uni-name">${r.uni}</div>
        <div class="card-program-name">${r.program}</div>
        <div class="card-country">${r.country}</div>
      </div>
      <div class="card-meta">
        <div class="card-meta-item">
          <span class="card-meta-label">Intake</span>
          <span class="card-meta-value">${firstIntake}</span>
        </div>
        <div class="card-meta-item">
          <span class="card-meta-label">⏱ Duration</span>
          <span class="card-meta-value">${r.duration || '—'}</span>
        </div>
        <div class="card-meta-item">
          <span class="card-meta-label">Min. GPA</span>
          <span class="card-meta-value">—</span>
        </div>
      </div>
      <div class="card-fees">
        <div class="card-fee-block">
          <span class="card-fee-label">🔥 Tuition</span>
          <span class="card-fee-value">${r.tuition && r.tuition !== 'Contact RACE' ? r.tuition : '<span style="font-size:0.75rem;color:var(--muted)">Contact RACE</span>'}</span>
        </div>
        <div class="card-fee-block right">
          <span class="card-fee-label">📋 Application</span>
          <span class="card-fee-value">—</span>
        </div>
      </div>
      <div class="card-scores">
        <div class="card-scores-heading">📋 Test Scores</div>
        <div class="scores-grid">
          <div class="score-chip"><span class="score-val">${s.ielts}</span><span class="score-label">IELTS</span></div>
          <div class="score-chip"><span class="score-val">${s.toefl}</span><span class="score-label">TOEFL</span></div>
          <div class="score-chip"><span class="score-val">${s.pte}</span><span class="score-label">PTE</span></div>
          <div class="score-chip"><span class="score-val">${s.det}</span><span class="score-label">Duo</span></div>
        </div>
      </div>
    </div>`;
}

function renderPage() {
  const body  = document.getElementById('results-body');
  const start = (currentPage - 1) * CARDS_PER_PAGE;
  body.innerHTML = filteredData.slice(start, start + CARDS_PER_PAGE).map(buildCard).join('');

  const totalPages = Math.max(1, Math.ceil(filteredData.length / CARDS_PER_PAGE));
  document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages}`;
  document.getElementById('prev-btn').disabled = currentPage === 1;
  document.getElementById('next-btn').disabled = currentPage >= totalPages;
}

function runSearch() {
  const country = document.getElementById('country').value;
  const level   = document.getElementById('level').value;
  const field   = document.getElementById('field').value;

  filteredData = DB.filter(r =>
    (!country || r.country === country) &&
    (!level   || r.level   === level)   &&
    (!field   || r.field   === field)
  );
  currentPage = 1;

  const section = document.getElementById('results-section');
  const summary = document.getElementById('result-summary');
  const pagination = document.getElementById('pagination-controls');

  section.style.display = 'block';
  summary.textContent = filteredData.length + ' program' + (filteredData.length !== 1 ? 's' : '') + ' found';
  pagination.style.display = filteredData.length > CARDS_PER_PAGE ? 'flex' : 'none';

  if (filteredData.length === 0) {
    document.getElementById('results-body').innerHTML =
      '<p style="opacity:0.5;text-align:center;padding:50px;grid-column:1/-1;">No results found. Please contact RACE counselors for this selection.</p>';
  } else {
    renderPage();
  }

  section.scrollIntoView({behavior:'smooth'});
}

function changePage(step) {
  currentPage += step;
  renderPage();
  document.getElementById('results-section').scrollIntoView({behavior:'smooth'});
}

syncFilters();
</script>
