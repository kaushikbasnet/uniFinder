<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RACE | Study Abroad Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#116e94;
  --primary-dark:#0d5572;
  --primary-light:#1a8ab8;
  --accent:#e8f4f9;
  --off-white:#f7fbfd;
  --soft-gray:#edf4f7;
  --glass:rgba(255,255,255,0.92);
  --text:#0a2433;
  --muted:#5a7a8a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Montserrat',sans-serif;
  background:var(--off-white);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}

/* ── HERO ── */
.hero{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding:70px 8% 60px;
  overflow:hidden;
  min-height:520px;
  justify-content:center;
}

/* Europe map image background */
.hero-map-bg{
  position:absolute;
  inset:0;
  z-index:0;
  overflow:hidden;
  background:#eef7fb;
}
.hero-map-bg img{
  position:absolute;
  top:50%;
  left:55%;
  transform:translate(-50%,-50%);
  width:85%;
  max-width:820px;
  opacity:0.13;
  filter:saturate(0.6) hue-rotate(160deg) brightness(0.7);
  pointer-events:none;
  user-select:none;
}
.hero-map-bg::after{
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse at 30% 50%, rgba(247,251,253,0.45) 0%, transparent 70%),
    linear-gradient(to bottom, rgba(238,247,251,0.1) 0%, rgba(238,247,251,0.92) 85%, rgba(238,247,251,1) 100%);
  z-index:2;
  pointer-events:none;
}

.hero-content{position:relative;z-index:2;max-width:780px;margin-bottom:44px;}

h1{
  font-family:'Montserrat',sans-serif;
  font-size:clamp(2.2rem,4.2vw,3.6rem);
  line-height:1.08;
  font-weight:900;
  margin-bottom:18px;
  letter-spacing:-1.5px;
  white-space:nowrap;
}
@media(max-width:700px){h1{white-space:normal;font-size:2rem;}}
h1 em{font-style:italic;color:var(--primary);font-weight:800;}

.hero-p{
  font-size:0.95rem;
  color:var(--muted);
  line-height:1.8;
  max-width:520px;
  margin:0 auto 32px;
  font-weight:400;
}
.hero-p strong{color:var(--primary);font-weight:700;}
.intake-row{display:flex;gap:32px;justify-content:center;flex-wrap:wrap;}
.intake-item{border-left:3px solid var(--primary);padding-left:15px;text-align:left;}
.intake-item:last-child{border-left-color:var(--primary-light);opacity:0.8;}
.intake-item .val{font-weight:800;font-size:1.2rem;color:var(--primary);}
.intake-item .lbl{font-size:0.62rem;opacity:0.6;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-top:2px;}

/* search card */
.search-container{position:relative;z-index:2;width:100%;max-width:540px;}
.search-card{
  background:var(--glass);
  backdrop-filter:blur(20px);
  padding:42px 44px;
  border-radius:24px;
  border:1px solid rgba(17,110,148,0.15);
  box-shadow:0 20px 80px rgba(17,110,148,0.12),0 4px 20px rgba(17,110,148,0.06);
}
.search-card-title{
  font-size:0.65rem;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:2px;
  color:var(--primary);
  margin-bottom:24px;
  padding-bottom:14px;
  border-bottom:1px solid rgba(17,110,148,0.12);
}
.input-group{margin-bottom:20px;}
.input-group label{
  display:block;
  font-size:0.58rem;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:1.5px;
  margin-bottom:6px;
  color:var(--muted);
}
.input-group select{
  width:100%;
  background:var(--accent);
  border:1.5px solid transparent;
  border-radius:10px;
  padding:11px 14px;
  font-size:0.88rem;
  font-family:'Montserrat',sans-serif;
  color:var(--text);
  cursor:pointer;
  outline:none;
  transition:border-color 0.25s,background 0.25s;
  font-weight:500;
}
.input-group select:focus{border-color:var(--primary);background:#fff;}
.cta-btn{
  width:100%;
  padding:16px;
  background:var(--primary);
  color:#fff;
  border:none;
  border-radius:12px;
  font-weight:800;
  font-size:0.78rem;
  text-transform:uppercase;
  letter-spacing:2px;
  cursor:pointer;
  transition:all 0.28s;
  margin-top:8px;
  font-family:'Montserrat',sans-serif;
}
.cta-btn:hover{background:var(--primary-dark);transform:translateY(-2px);box-shadow:0 8px 24px rgba(17,110,148,0.3);}

/* ── RESULTS ── */
#results-section{padding:60px 8%;display:none;background:#fff;border-top:2px solid var(--accent);}
.results-header{margin-bottom:40px;}
.results-header h3{
  font-family:'Montserrat',sans-serif;
  font-size:1.9rem;
  font-weight:800;
  letter-spacing:-0.5px;
  color:var(--text);
}
.result-summary{
  font-size:0.78rem;
  color:var(--muted);
  margin-top:8px;
  font-weight:600;
  letter-spacing:0.3px;
}

/* University block */
.uni-section{
  margin-bottom:56px;
  border:1.5px solid rgba(17,110,148,0.12);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 4px 24px rgba(17,110,148,0.06);
}
.uni-section-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:14px;
  padding:24px 30px;
  background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%);
  color:#fff;
}
.uni-section-name{
  font-family:'Montserrat',sans-serif;
  font-size:1.25rem;
  font-weight:800;
  line-height:1.2;
  letter-spacing:-0.3px;
}
.uni-section-meta{
  font-size:0.65rem;
  font-weight:600;
  opacity:0.8;
  text-transform:uppercase;
  letter-spacing:1.2px;
  margin-top:4px;
}
.uni-section-badge{
  background:rgba(255,255,255,0.2);
  color:#fff;
  font-size:0.62rem;
  font-weight:800;
  padding:7px 16px;
  border-radius:20px;
  text-transform:uppercase;
  letter-spacing:1px;
  white-space:nowrap;
  border:1px solid rgba(255,255,255,0.3);
}
.uni-section-body{padding:24px 30px 30px;}

/* Level subheadings */
.level-heading{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:1rem;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:2.5px;
  color:var(--primary);
  margin:32px 0 18px;
  padding:14px 20px;
  background:linear-gradient(135deg,var(--accent) 0%,rgba(232,244,249,0.4) 100%);
  border-radius:10px;
  border-left:4px solid var(--primary);
}
.level-heading:first-child{margin-top:0;}
.level-heading::before{
  content:'';
  display:inline-block;
  width:10px;height:10px;
  background:var(--primary);
  border-radius:50%;
  flex-shrink:0;
}

/* Field subheadings within level */
.field-heading{
  display:inline-flex;
  align-items:center;
  gap:7px;
  font-size:0.6rem;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:1.2px;
  color:var(--primary-dark);
  background:var(--accent);
  padding:5px 14px;
  border-radius:6px;
  margin:18px 0 12px;
  border-left:3px solid var(--primary);
}
.field-heading:first-child{margin-top:4px;}

/* Cards */
.prog-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:16px;
  margin-bottom:4px;
}
.prog-card{
  background:#fff;
  border:1.5px solid rgba(17,110,148,0.1);
  border-radius:16px;
  padding:22px 22px 18px;
  display:flex;
  flex-direction:column;
  gap:10px;
  position:relative;
  overflow:hidden;
  transition:box-shadow 0.25s,transform 0.25s,border-color 0.25s;
}
.prog-card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg,var(--primary),var(--primary-light));
  opacity:0;
  transition:opacity 0.25s;
}
.prog-card:hover{
  box-shadow:0 10px 36px rgba(17,110,148,0.14);
  transform:translateY(-3px);
  border-color:rgba(17,110,148,0.25);
}
.prog-card:hover::before{opacity:1;}

.prog-intake-badge{
  position:absolute;
  top:0;right:0;
  background:var(--primary);
  color:#fff;
  font-size:0.56rem;
  font-weight:800;
  padding:5px 12px;
  border-bottom-left-radius:12px;
  text-transform:uppercase;
  letter-spacing:0.8px;
  font-family:'Montserrat',sans-serif;
}
.prog-name{
  font-size:0.92rem;
  font-weight:700;
  line-height:1.45;
  color:var(--text);
  padding-right:75px;
  letter-spacing:-0.2px;
}
.prog-meta-row{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:2px;
}
.pill{
  font-size:0.58rem;
  font-weight:700;
  padding:4px 10px;
  border-radius:20px;
  text-transform:uppercase;
  letter-spacing:0.5px;
  display:inline-block;
  font-family:'Montserrat',sans-serif;
}
.pill-blue{background:#dff0f8;color:#0d5572;}
.pill-green{background:#e6f6ed;color:#1a6b3a;}
.pill-gray{background:#eef2f4;color:#4a6575;}

.apply-btn{
  display:inline-block;
  background:var(--primary);
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:700;
  font-size:0.62rem;
  cursor:pointer;
  letter-spacing:1.2px;
  text-transform:uppercase;
  padding:9px 16px;
  margin-top:auto;
  align-self:flex-start;
  text-decoration:none;
  transition:background 0.2s,transform 0.2s;
  font-family:'Montserrat',sans-serif;
}
.apply-btn:hover{background:var(--primary-dark);transform:translateY(-1px);}

@media(max-width:640px){
  .prog-grid{grid-template-columns:1fr;}
  .search-card{padding:28px 22px;}
  .uni-section-header{padding:18px 20px;}
  .uni-section-body{padding:16px 18px 22px;}
}
</style>
</head>

const ALL_FIELDS = [
  "Architecture & Built Environment","Arts & Humanities","Business & Management",
  "Creative Arts, Design & Media","Engineering & Technology","Health Sciences",
  "Hospitality, Tourism & Culinary Arts","IT & Computer Science",
  "Law, Politics & Social Sciences","Sciences"
];

const APPLY_URL = "https://cmst.xyz/form/7e8a525a-8729-4d95-8938-5ee4355d29ec/general-inquiry-forms";

function syncFilters() {
  const country = document.getElementById('country').value;
  const level = document.getElementById('level').value;
  const fieldEl = document.getElementById('field');
  const prev = fieldEl.value;
  const available = new Set();
  DB.forEach(r => {
    if ((!country || r.country === country) && (!level || r.level === level)) available.add(r.field);
  });
  fieldEl.innerHTML = '<option value="">— All Fields —</option>';
  ALL_FIELDS.forEach(f => {
    if (available.has(f)) {
      const o = document.createElement('option');
      o.value = f; o.textContent = f;
      if (f === prev) o.selected = true;
      fieldEl.appendChild(o);
    }
  });
}

function runSearch() {
  const country = document.getElementById('country').value;
  const level   = document.getElementById('level').value;
  const field   = document.getElementById('field').value;

  const matches = DB.filter(r =>
    (!country || r.country === country) &&
    (!level   || r.level   === level)   &&
    (!field   || r.field   === field)
  );

  const section = document.getElementById('results-section');
  const body    = document.getElementById('results-body');
  const summary = document.getElementById('result-summary');

  section.style.display = 'block';

  if (matches.length === 0) {
    summary.textContent = '0 programs found';
    body.innerHTML = '<p style="opacity:0.5;text-align:center;padding:50px;">No results found. Please contact RACE counselors for this selection.</p>';
    section.scrollIntoView({behavior:'smooth'});
    return;
  }

  // Group by university name+country only (NOT level)
  const uniOrder = [];
  const uniMap = {};

  matches.forEach(r => {
    const key = r.uni + '||' + r.country;
    if (!uniMap[key]) {
      uniMap[key] = { uni: r.uni, country: r.country, byLevel: {} };
      uniOrder.push(key);
    }
    if (!uniMap[key].byLevel[r.level]) uniMap[key].byLevel[r.level] = { byField: {} };
    if (!uniMap[key].byLevel[r.level].byField[r.field]) uniMap[key].byLevel[r.level].byField[r.field] = [];
    uniMap[key].byLevel[r.level].byField[r.field].push(r);
  });

  const totalPrograms = matches.length;
  summary.textContent = uniOrder.length + ' institution' + (uniOrder.length !== 1 ? 's' : '') +
    ' · ' + totalPrograms + ' program' + (totalPrograms !== 1 ? 's' : '') + ' found';

  const LEVEL_ORDER = ['Undergraduate','Postgraduate'];

  body.innerHTML = uniOrder.map(key => {
    const e = uniMap[key];
    const totalCount = matches.filter(r => r.uni === e.uni && r.country === e.country).length;

    const allIntakes = [...new Set(
      Object.values(e.byLevel).flatMap(lv => Object.values(lv.byField).flat().map(r => r.intake)).filter(Boolean)
    )];
    const intakeLabel = allIntakes.length === 1 ? allIntakes[0] : 'Multiple intakes';

    const levelsPresent = LEVEL_ORDER.filter(lv => e.byLevel[lv]);
    const showLevelHeadings = levelsPresent.length > 1 || !level;

    let innerHtml = '';
    levelsPresent.forEach(lv => {
      if (showLevelHeadings) {
        innerHtml += `<div class="level-heading">${lv}</div>`;
      }
      const byField = e.byLevel[lv].byField;
      const fields = Object.keys(byField);
      const showFieldHeadings = fields.length > 1 || !field;

      fields.forEach(f => {
        if (showFieldHeadings) {
          innerHtml += `<div class="field-heading">${f}</div>`;
        }
        innerHtml += '<div class="prog-grid">';
        byField[f].forEach(r => {
          const firstIntake = r.intake ? r.intake.split('/')[0].trim() : 'TBC';
          const pills = [
            r.tuition  ? `<span class="pill pill-blue">${r.tuition}</span>` : '',
            r.duration ? `<span class="pill pill-gray">${r.duration}</span>` : '',
            r.english  ? `<span class="pill pill-green">${r.english}</span>` : ''
          ].filter(Boolean).join('');

          innerHtml += `
            <div class="prog-card">
              <div class="prog-intake-badge">${firstIntake}</div>
              <div class="prog-name">${r.program}</div>
              ${pills ? `<div class="prog-meta-row">${pills}</div>` : ''}
              <a class="apply-btn" href="${APPLY_URL}" target="_blank" rel="noopener">Apply ${firstIntake} &rarr;</a>
            </div>`;
        });
        innerHtml += '</div>';
      });
    });

    return `
      <div class="uni-section">
        <div class="uni-section-header">
          <div>
            <div class="uni-section-name">${e.uni}</div>
            <div class="uni-section-meta">${e.country} &nbsp;·&nbsp; ${totalCount} program${totalCount!==1?'s':''}</div>
          </div>
          <div class="uni-section-badge">${intakeLabel}</div>
        </div>
        <div class="uni-section-body">${innerHtml}</div>
      </div>`;
  }).join('');

  section.scrollIntoView({behavior:'smooth'});
}

syncFilters();
