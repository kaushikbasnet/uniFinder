<html lang="en">

    <title>RACE | Study Abroad Finder</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --navy: #002147;
        --red: #ed1c24;
        --off-white: #fcfbf7;
        --soft-gray: #f1f1f1;
        --glass: rgba(255, 255, 255, 0.85);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: var(--off-white);
        color: var(--navy);
        -webkit-font-smoothing: antialiased;
      }
      .hero {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 60px 8% 40px 8%;
        min-height: 85vh;
        gap: 60px;
        background: radial-gradient(
          circle at top right,
          rgba(237, 28, 36, 0.03),
          transparent 40%
        );
      }
      .hero-content {
        flex: 1.2;
      }
      h1 {
        font-family: "Playfair Display", serif;
        font-size: clamp(2.5rem, 4vw, 4rem);
        line-height: 1.1;
        font-weight: 900;
        margin-bottom: 20px;
        letter-spacing: -1px;
      }
      h1 em {
        font-style: italic;
        color: var(--red);
        font-weight: 700;
      }
      .hero-p {
        font-size: 1rem;
        color: #555;
        line-height: 1.8;
        max-width: 500px;
        margin-bottom: 40px;
        font-weight: 300;
      }
      .search-container {
        flex: 0.8;
      }
      .search-card {
        background: var(--glass);
        backdrop-filter: blur(15px);
        padding: 40px;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow: 0 30px 100px rgba(0, 33, 71, 0.08);
      }
      .input-group {
        margin-bottom: 22px;
      }
      .input-group label {
        display: block;
        font-size: 0.65rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 5px;
        opacity: 0.5;
      }
      .input-group select {
        width: 100%;
        background: transparent;
        border: none;
        border-bottom: 1px solid #ddd;
        padding: 10px 0;
        font-size: 0.95rem;
        color: var(--navy);
        cursor: pointer;
        outline: none;
        transition: border-color 0.3s;
      }
      .input-group select:focus {
        border-bottom-color: var(--red);
      }
      .cta-btn {
        width: 100%;
        padding: 18px;
        background: var(--navy);
        color: #fff;
        border: none;
        border-radius: 16px;
        font-weight: 700;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 10px;
      }
      .cta-btn:hover {
        background: var(--red);
        transform: translateY(-2px);
      }
      #results-section {
        padding: 60px 8%;
        display: none;
        background: #fff;
        border-top: 1px solid var(--soft-gray);
      }
      .result-summary {
        font-size: 0.82rem;
        color: #888;
        margin-top: 8px;
        margin-bottom: 40px;
      }

      /* University section block */
      .uni-section {
        margin-bottom: 60px;
      }
      .uni-section-header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
        padding-bottom: 18px;
        border-bottom: 2px solid var(--navy);
        margin-bottom: 24px;
      }
      .uni-section-name {
        font-family: "Playfair Display", serif;
        font-size: 1.8rem;
        font-weight: 900;
        line-height: 1.1;
      }
      .uni-section-meta {
        font-size: 0.7rem;
        font-weight: 700;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 4px;
      }
      .uni-section-badge {
        background: var(--navy);
        color: #fff;
        font-size: 0.62rem;
        font-weight: 700;
        padding: 6px 14px;
        border-radius: 20px;
        text-transform: uppercase;
        letter-spacing: 1px;
        white-space: nowrap;
      }

      /* Field sub-heading inside a uni section */
      .field-heading {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.68rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #fff;
        background: var(--red);
        padding: 6px 16px;
        border-radius: 6px;
        margin: 32px 0 14px 0;
      }
      .field-heading:first-child {
        margin-top: 0;
      }
      .field-heading::before {
        content: "";
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #fff;
        border-radius: 50%;
        opacity: 0.7;
      }

      /* Program cards grid */
      .prog-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
      }

      /* Individual program card */
      .prog-card {
        background: var(--off-white);
        border-radius: 18px;
        padding: 22px 24px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        position: relative;
        overflow: hidden;
        transition:
          box-shadow 0.25s,
          transform 0.25s;
      }
      .prog-card:hover {
        box-shadow: 0 8px 32px rgba(0, 33, 71, 0.1);
        transform: translateY(-2px);
      }
      .prog-intake-badge {
        position: absolute;
        top: 0;
        right: 0;
        background: var(--red);
        color: #fff;
        font-size: 0.58rem;
        font-weight: 700;
        padding: 6px 12px;
        border-bottom-left-radius: 12px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }
      .prog-name {
        font-size: 0.88rem;
        font-weight: 600;
        line-height: 1.45;
        color: var(--navy);
        padding-right: 70px;
      }
      .prog-meta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 2px;
      }
      .pill {
        font-size: 0.6rem;
        font-weight: 700;
        padding: 3px 9px;
        border-radius: 20px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        display: inline-block;
      }
      .pill-blue {
        background: #e6f1fb;
        color: #185fa5;
      }
      .pill-green {
        background: #eaf3de;
        color: #3b6d11;
      }
      .pill-gray {
        background: #f1efe8;
        color: #5f5e5a;
      }
      .pill-red {
        background: #fcebeb;
        color: #a32d2d;
      }
      .apply-btn {
        background: none;
        border: none;
        font-weight: 800;
        font-size: 0.65rem;
        color: var(--red);
        cursor: pointer;
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 0;
        margin-top: auto;
        align-self: flex-start;
      }
      @media (max-width: 1024px) {
        .hero {
          flex-direction: column;
          text-align: center;
        }
        .hero-p {
          margin: 0 auto 35px auto;
        }
      }
      @media (max-width: 600px) {
        .prog-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

          </div>
          <div class="input-group">

          </div>
          <div class="input-group">
            <label>Field of Study</label>
            <select id="field">

            </select>
          </div>
          <button class="cta-btn" onclick="runSearch()">
            Find Universities &amp; Intakes
          </button>
        </div>
      </div>
    </section>

      // All possible fields
      const ALL_FIELDS = [
        "Arts & Humanities",

        "Sciences",

      function syncFilters() {
        const country = document.getElementById("country").value;
        const level = document.getElementById("level").value;
        const fieldEl = document.getElementById("field");
        const prev = fieldEl.value;
        const available = new Set();
        DB.forEach((r) => {
          if (
            (!country || r.country === country) &&
            (!level || r.level === level)
          )
            available.add(r.field);
        });
        fieldEl.innerHTML = '<option value="">— All Fields —</option>';
        ALL_FIELDS.forEach((f) => {
          if (available.has(f)) {
            const o = document.createElement("option");
            o.value = f;
            o.textContent = f;
            if (f === prev) o.selected = true;
            fieldEl.appendChild(o);
          }
        });
      }

      function runSearch() {
        const country = document.getElementById("country").value;
        const level = document.getElementById("level").value;
        const field = document.getElementById("field").value;

        const matches = DB.filter(
          (r) =>
            (!country || r.country === country) &&
            (!level || r.level === level) &&
            (!field || r.field === field),
        );

        const section = document.getElementById("results-section");
        const body = document.getElementById("results-body");
        const summary = document.getElementById("result-summary");

        section.style.display = "block";

        if (matches.length === 0) {
          summary.textContent = "0 programs found";
          body.innerHTML =
            '<p style="opacity:0.5;text-align:center;padding:50px;">No results found. Please contact RACE counselors for this selection.</p>';
          section.scrollIntoView({ behavior: "smooth" });
          return;
        }

        // Step 1: group programs → uni → field → [programs]
        // Order: preserve insertion order of universities
        const uniOrder = [];
        const uniMap = {}; // key → { uni, country, level, byField: { fieldName: [rows] } }

        matches.forEach((r) => {
          const key = r.uni + "||" + r.country + "||" + r.level;
          if (!uniMap[key]) {
            uniMap[key] = {
              uni: r.uni,
              country: r.country,
              level: r.level,
              byField: {},
            };
            uniOrder.push(key);
          }
          if (!uniMap[key].byField[r.field]) uniMap[key].byField[r.field] = [];
          uniMap[key].byField[r.field].push(r);
        });

        summary.textContent =
          uniOrder.length +
          " institution" +
          (uniOrder.length !== 1 ? "s" : "") +
          " · " +
          matches.length +
          " program" +
          (matches.length !== 1 ? "s" : "") +
          " found";

        // Step 2: render one section per university
        body.innerHTML = uniOrder
          .map((key) => {
            const e = uniMap[key];
            const totalCount = matches.filter(
              (r) =>
                r.uni === e.uni &&
                r.country === e.country &&
                r.level === e.level,
            ).length;
            const fields = Object.keys(e.byField);
            const showFieldHeadings = fields.length > 1 || !field; // show field headings when multiple fields

            // Collect all intakes for this uni (unique)
            const allIntakes = [
              ...new Set(
                Object.values(e.byField)
                  .flat()
                  .map((r) => r.intake)
                  .filter(Boolean),
              ),
            ];
            const intakeLabel =
              allIntakes.length === 1 ? allIntakes[0] : "Multiple intakes";

            // Build program cards, optionally grouped by field
            let cardsHtml = "";
            fields.forEach((f) => {
              if (showFieldHeadings) {
                cardsHtml += `<div class="field-heading">${f}</div>`;
              }
              cardsHtml += '<div class="prog-grid">';
              e.byField[f].forEach((r) => {
                const firstIntake = r.intake
                  ? r.intake.split("/")[0].trim()
                  : "TBC";
                const pills = [
                  r.tuition
                    ? `<span class="pill pill-blue">${r.tuition}</span>`
                    : "",
                  r.duration
                    ? `<span class="pill pill-gray">${r.duration}</span>`
                    : "",
                  r.english
                    ? `<span class="pill pill-green">${r.english}</span>`
                    : "",
                ]
                  .filter(Boolean)
                  .join("");

                cardsHtml += `
          <div class="prog-card">
            <div class="prog-intake-badge">${firstIntake}</div>
            <div class="prog-name">${r.program}</div>
            ${pills ? `<div class="prog-meta-row">${pills}</div>` : ""}
            <button class="apply-btn">Apply ${firstIntake} &rarr;</button>
          </div>`;
              });
              cardsHtml += "</div>";
            });

            return `
      <div class="uni-section">
        <div class="uni-section-header">
          <div>
            <div class="uni-section-name">${e.uni}</div>
            <div class="uni-section-meta">${e.country} &nbsp;·&nbsp; ${e.level} &nbsp;·&nbsp; ${totalCount} program${totalCount !== 1 ? "s" : ""}</div>
          </div>
          <div class="uni-section-badge">${intakeLabel}</div>
        </div>
        ${cardsHtml}
      </div>`;
          })
          .join("");

        section.scrollIntoView({ behavior: "smooth" });
      }

      syncFilters();
    </script>
  </body>
</html>
